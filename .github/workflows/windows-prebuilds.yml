name: CI

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Code quality
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify workflow commit belongs to master
        run: git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/master

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check shared standards
        run: npm run check

      - name: Verify vendored sources
        run: npm run deps:check:vendor

      - name: Verify generated benchmark report
        run: npm run bench:report:check

  linux:
    name: Linux x64 / Node.js ${{ matrix.node }}
    runs-on:
      group: swm-ci
      labels: swm-linux
    timeout-minutes: 30
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - node: 22
            abi: 127
          - node: 24
            abi: 137

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require native x86-64 PGO host
        shell: bash
        run: |
          arch="$(uname -m)"
          if [ "$arch" != "x86_64" ]; then
            echo "Linux PGO training must run natively on x86-64, got $arch" >&2
            exit 1
          fi

      - name: Build and smoke-test native addon on Bookworm
        shell: bash
        run: |
          rm -rf prebuilds/linux-x64-glibc

          node_image="node:${{ matrix.node }}-bookworm"
          for attempt in 1 2 3; do
            if docker pull "$node_image"; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Failed to pull $node_image after $attempt attempts" >&2
              exit 1
            fi

            sleep "$((attempt * 5))"
          done

          docker build \
            --platform linux/amd64 \
            --pull=false \
            --build-arg NODE_VERSION=${{ matrix.node }} \
            --target prebuild \
            --output type=local,dest=prebuilds \
            .

      - name: Verify prebuild
        shell: bash
        run: |
          path="prebuilds/linux-x64-glibc/node-v${{ matrix.abi }}.node"
          test -f "$path"
          file "$path" | grep -q 'ELF 64-bit'
          sha256sum "$path"

      - name: Verify Bookworm ABI ceilings
        shell: bash
        run: |
          path="prebuilds/linux-x64-glibc/node-v${{ matrix.abi }}.node"

          check_ceiling() {
            prefix="$1"
            ceiling="$2"
            required="$(strings "$path" | grep -oE "${prefix}_[0-9]+(\.[0-9]+)+" | sort -Vu | tail -1)"
            test -n "$required"

            highest="$(printf '%s\n%s\n' "$required" "$ceiling" | sort -Vu | tail -1)"
            if [ "$highest" != "$ceiling" ]; then
              echo "$path requires $required, above the Bookworm ceiling $ceiling" >&2
              exit 1
            fi

            echo "$path requires at most $required (Bookworm ceiling: $ceiling)"
          }

          glibcxx_required="$(strings "$path" | grep -oE 'GLIBCXX_[0-9]+(\.[0-9]+)+' | sort -Vu | tail -1 || true)"
          if [ -n "$glibcxx_required" ]; then
            check_ceiling GLIBCXX GLIBCXX_3.4.30
          else
            dynamic_dependencies="$(ldd "$path")"
            if grep -qE 'libstdc\+\+|libgcc_s' <<<"$dynamic_dependencies"; then
              echo "$path has dynamic C++ runtime dependencies without GLIBCXX markers" >&2
              exit 1
            fi
            echo "$path statically links the C++ runtime"
          fi
          check_ceiling GLIBC GLIBC_2.36

      - name: Upload ABI prebuild
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-node-v${{ matrix.abi }}
          path: prebuilds/linux-x64-glibc/node-v${{ matrix.abi }}.node
          if-no-files-found: error
          retention-days: 14

  windows:
    name: Windows x64 / Node.js ${{ matrix.node }}
    runs-on:
      group: swm-ci
      labels: swm-win
    timeout-minutes: 30
    defaults:
      run:
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command "& '{0}'"
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - node: 22
            abi: 127
          - node: 24
            abi: 137

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install build dependencies
        run: npm ci

      - name: Build native addon
        run: npm run build:native

      - name: Run package smoke test
        run: npm test

      - name: Run raw V8 HTTP smoke test
        run: npm run test:v8-http

      - name: Verify snapshot V8 shapes
        run: npm run test:v8-snapshot-shapes

      - name: Run raw V8 WebSocket smoke test
        run: npm run test:v8-ws

      - name: Verify runtime-only installation
        run: |
          Remove-Item -Recurse -Force build, node_modules
          npm ci --omit=dev
          if (Test-Path node_modules/@swarmmachina/standards) {
            throw "@swarmmachina/standards leaked into the runtime installation"
          }
          if (Test-Path node_modules/node-addon-api) {
            throw "node-addon-api leaked into the runtime installation"
          }
          if (Test-Path node_modules/node-gyp) {
            throw "node-gyp leaked into the runtime installation"
          }
          npm test

      - name: Verify prebuild
        run: |
          $path = "prebuilds/win32-x64/node-v${{ matrix.abi }}.node"
          if (-not (Test-Path $path)) {
            throw "Missing expected prebuild: $path"
          }
          Get-Item $path
          Get-FileHash -Algorithm SHA256 $path

      - name: Upload ABI prebuild
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-node-v${{ matrix.abi }}
          path: prebuilds/win32-x64/node-v${{ matrix.abi }}.node
          if-no-files-found: error
          retention-days: 14

  macos:
    name: macOS ${{ matrix.arch }} / Node.js ${{ matrix.node }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - node: 22
            abi: 127
            arch: arm64
            binary_arch: arm64
            runner: macos-15
          - node: 24
            abi: 137
            arch: arm64
            binary_arch: arm64
            runner: macos-15
          - node: 22
            abi: 127
            arch: x64
            binary_arch: x86_64
            runner: macos-15-intel
          - node: 24
            abi: 137
            arch: x64
            binary_arch: x86_64
            runner: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          architecture: ${{ matrix.arch }}

      - name: Install build dependencies
        run: npm ci

      - name: Build native addon
        run: npm run build:native

      - name: Run package smoke test
        run: npm test

      - name: Run raw V8 HTTP smoke test
        run: npm run test:v8-http

      - name: Verify snapshot V8 shapes
        run: npm run test:v8-snapshot-shapes

      - name: Run raw V8 WebSocket smoke test
        run: npm run test:v8-ws

      - name: Verify runtime-only installation
        run: |
          rm -rf build node_modules
          npm ci --omit=dev
          test ! -d node_modules/@swarmmachina/standards
          test ! -d node_modules/node-gyp
          npm test

      - name: Verify prebuild
        run: |
          path="prebuilds/darwin-${{ matrix.arch }}/node-v${{ matrix.abi }}.node"
          test -f "$path"
          file "$path" | grep -q 'Mach-O 64-bit'
          test "$(lipo -archs "$path")" = "${{ matrix.binary_arch }}"
          shasum -a 256 "$path"

      - name: Upload ABI prebuild
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-node-v${{ matrix.abi }}
          path: prebuilds/darwin-${{ matrix.arch }}/node-v${{ matrix.abi }}.node
          if-no-files-found: error
          retention-days: 14

  regression-gate:
    name: PGO performance regression gate
    runs-on:
      group: swm-ci
      labels: swm-linux
    timeout-minutes: 30
    needs:
      - linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Download PGO+LTO candidate
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-node-v127
          path: prebuilds/linux-x64-glibc

      - name: Install pinned upstream reference
        run: |
          npm install \
            --prefix "$RUNNER_TEMP/uws-reference" \
            --ignore-scripts \
            --no-save \
            "uwebsockets.js@github:uNetworking/uWebSockets.js#v20.69.0"
          reference="$RUNNER_TEMP/uws-reference/node_modules/uwebsockets.js/ESM_wrapper.mjs"
          echo "SWM_UWS_REFERENCE=$reference" >> "$GITHUB_ENV"
          echo "SWM_BENCH_REFERENCE=$reference" >> "$GITHUB_ENV"

      - name: Verify upstream runtime surface
        run: npm run test:compat:upstream

      - name: Run paired PGO benchmark
        run: npm run bench:compare:pgo:linux -- "$RUNNER_TEMP/pgo-benchmark"
        env:
          SWM_BENCH_SKIP_PERF: 1

      - name: Run async snapshot PGO benchmark
        run: |
          npm run bench:snapshot -- \
            --binding "$GITHUB_WORKSPACE/prebuilds/linux-x64-glibc/node-v127.node" \
            --label pgo-lto-node-22 \
            --output "$RUNNER_TEMP/pgo-benchmark/snapshot-async.json" \
            --runs 3 \
            --connections 64 \
            --pipelining 1 \
            --headerVariants 24 \
            --warmup 3 \
            --duration 10 \
            --workers 4

      - name: Publish benchmark summary
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/pgo-benchmark/report.md" ]; then
            cat "$RUNNER_TEMP/pgo-benchmark/report.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload benchmark evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pgo-performance-report
          path: ${{ runner.temp }}/pgo-benchmark/
          if-no-files-found: warn
          retention-days: 14

  package:
    name: Assemble npm package
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs:
      - linux
      - windows
      - macos
      - regression-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Download Linux Node.js 22 prebuild
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-node-v127
          path: prebuilds/linux-x64-glibc

      - name: Download Linux Node.js 24 prebuild
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-node-v137
          path: prebuilds/linux-x64-glibc

      - name: Download Windows Node.js 22 prebuild
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-node-v127
          path: prebuilds/win32-x64

      - name: Download Windows Node.js 24 prebuild
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-node-v137
          path: prebuilds/win32-x64

      - name: Download macOS arm64 Node.js 22 prebuild
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-node-v127
          path: prebuilds/darwin-arm64

      - name: Download macOS arm64 Node.js 24 prebuild
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64-node-v137
          path: prebuilds/darwin-arm64

      - name: Download macOS x64 Node.js 22 prebuild
        uses: actions/download-artifact@v4
        with:
          name: macos-x64-node-v127
          path: prebuilds/darwin-x64

      - name: Download macOS x64 Node.js 24 prebuild
        uses: actions/download-artifact@v4
        with:
          name: macos-x64-node-v137
          path: prebuilds/darwin-x64

      - name: Install dependencies
        run: npm ci

      - name: Validate release prebuild formats
        run: npm run check:release

      - name: Pack release candidate
        run: |
          mkdir -p dist
          npm pack --pack-destination dist

      - name: Upload combined prebuilds
        uses: actions/upload-artifact@v4
        with:
          name: release-prebuilds
          path: prebuilds/**/*.node
          if-no-files-found: error
          retention-days: 14

      - name: Upload npm package
        uses: actions/upload-artifact@v4
        with:
          name: swm-uws-release-candidate
          path: dist/*.tgz
          if-no-files-found: error
          retention-days: 14

  package-smoke:
    name: Package smoke / ${{ matrix.os }} / Node.js ${{ matrix.node }}
    needs: package
    runs-on:
      group: swm-ci
      labels: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            runner: swm-linux
            node: 22
          - os: ubuntu-24.04
            runner: swm-linux
            node: 24
          - os: windows-self-hosted
            runner: swm-win
            node: 22
          - os: windows-self-hosted
            runner: swm-win
            node: 24

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: runner.os == 'Windows'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Download npm package
        uses: actions/download-artifact@v4
        with:
          name: swm-uws-release-candidate
          path: dist

      - name: Install and smoke-test packed package on Bookworm
        if: runner.os == 'Linux'
        shell: bash
        run: |
          docker run --rm \
            --platform linux/amd64 \
            --memory 1g \
            --mount "type=bind,source=$GITHUB_WORKSPACE,target=/workspace,readonly" \
            node:${{ matrix.node }}-bookworm-slim \
            sh -euc '
              tgz="$(find /workspace/dist -name "*.tgz" -type f -print -quit)"
              test -n "$tgz"
              mkdir /tmp/consumer
              cp /workspace/test/installed-smoke.js /tmp/consumer/smoke.mjs
              cd /tmp/consumer
              npm init -y >/dev/null
              npm install "$tgz" --omit=dev --ignore-scripts --no-audit --no-fund
              node smoke.mjs
            '

      - name: Install and smoke-test packed package on Windows
        if: runner.os == 'Windows'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command "& '{0}'"
        run: |
          $tgz = Get-ChildItem "$env:GITHUB_WORKSPACE\dist" -Filter '*.tgz' -File | Select-Object -First 1
          if (-not $tgz) {
            throw 'Missing packed npm package'
          }
          New-Item -ItemType Directory consumer | Out-Null
          Copy-Item test/installed-smoke.js consumer/smoke.mjs
          Set-Location consumer
          npm.cmd init -y
          npm.cmd install $tgz.FullName --omit=dev
          node smoke.mjs

  package-smoke-macos:
    name: Package smoke / macOS ${{ matrix.arch }} / Node.js ${{ matrix.node }}
    needs: package
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - node: 22
            arch: arm64
            runner: macos-15
          - node: 24
            arch: arm64
            runner: macos-15
          - node: 22
            arch: x64
            runner: macos-15-intel
          - node: 24
            arch: x64
            runner: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          architecture: ${{ matrix.arch }}

      - name: Download npm package
        uses: actions/download-artifact@v4
        with:
          name: swm-uws-release-candidate
          path: dist

      - name: Install and smoke-test packed package
        shell: bash
        run: |
          tgz="$(find "$GITHUB_WORKSPACE/dist" -name '*.tgz' -type f -print -quit)"
          test -n "$tgz"
          mkdir consumer
          cp test/installed-smoke.js consumer/smoke.mjs
          cd consumer
          npm init -y
          npm install "$tgz" --omit=dev
          node smoke.mjs

  publish:
    name: Publish npm package
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - package-smoke
      - package-smoke-macos
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          test "$tag_version" = "$package_version"

      - name: Download tested npm package
        uses: actions/download-artifact@v4
        with:
          name: swm-uws-release-candidate
          path: dist

      - name: Publish npm package
        shell: bash
        run: |
          tgz="$(find "$GITHUB_WORKSPACE/dist" -name '*.tgz' -type f -print -quit)"
          test -n "$tgz"
          npm publish "$tgz" --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
