name: Prebuilds

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  quality:
    name: Code quality
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release tag belongs to master
        if: startsWith(github.ref, 'refs/tags/')
        run: git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/master

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check shared standards
        run: npm run check

  linux:
    name: Linux x64 / Node.js ${{ matrix.node }}
    runs-on:
      group: swm-ci
      labels: swm-linux
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - node: 22
            abi: 127
          - node: 24
            abi: 137

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install build dependencies
        run: npm ci

      - name: Build native addon
        run: npm run build:native

      - name: Run HTTP and WebSocket smoke test
        run: npm test

      - name: Verify runtime-only installation
        run: |
          rm -rf build node_modules
          npm ci --omit=dev
          test ! -d node_modules/@swarmmachina/standards
          test ! -d node_modules/node-addon-api
          test ! -d node_modules/node-gyp
          npm test

      - name: Verify prebuild
        run: |
          path="prebuilds/linux-x64-glibc/node-v${{ matrix.abi }}.node"
          test -f "$path"
          file "$path" | grep -q 'ELF 64-bit'
          sha256sum "$path"

      - name: Upload ABI prebuild
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-node-v${{ matrix.abi }}
          path: prebuilds/linux-x64-glibc/node-v${{ matrix.abi }}.node
          if-no-files-found: error
          retention-days: 14

  windows:
    name: Windows x64 / Node.js ${{ matrix.node }}
    runs-on:
      group: swm-ci
      labels: swm-win
    defaults:
      run:
        shell: powershell -NoProfile -ExecutionPolicy Bypass -Command "& '{0}'"
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - node: 22
            abi: 127
          - node: 24
            abi: 137

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install build dependencies
        run: npm ci

      - name: Build native addon
        run: npm run build:native

      - name: Run HTTP and WebSocket smoke test
        run: npm test

      - name: Verify runtime-only installation
        run: |
          Remove-Item -Recurse -Force build, node_modules
          npm ci --omit=dev
          if (Test-Path node_modules/@swarmmachina/standards) {
            throw "@swarmmachina/standards leaked into the runtime installation"
          }
          if (Test-Path node_modules/node-addon-api) {
            throw "node-addon-api leaked into the runtime installation"
          }
          if (Test-Path node_modules/node-gyp) {
            throw "node-gyp leaked into the runtime installation"
          }
          npm test

      - name: Verify prebuild
        run: |
          $path = "prebuilds/win32-x64/node-v${{ matrix.abi }}.node"
          if (-not (Test-Path $path)) {
            throw "Missing expected prebuild: $path"
          }
          Get-Item $path
          Get-FileHash -Algorithm SHA256 $path

      - name: Upload ABI prebuild
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-node-v${{ matrix.abi }}
          path: prebuilds/win32-x64/node-v${{ matrix.abi }}.node
          if-no-files-found: error
          retention-days: 14

  package:
    name: Assemble npm package
    runs-on: ubuntu-24.04
    needs:
      - linux
      - windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Download Linux Node.js 22 prebuild
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-node-v127
          path: prebuilds/linux-x64-glibc

      - name: Download Linux Node.js 24 prebuild
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-node-v137
          path: prebuilds/linux-x64-glibc

      - name: Download Windows Node.js 22 prebuild
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-node-v127
          path: prebuilds/win32-x64

      - name: Download Windows Node.js 24 prebuild
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-node-v137
          path: prebuilds/win32-x64

      - name: Install dependencies
        run: npm ci

      - name: Validate release prebuild formats
        run: npm run check:release

      - name: Pack release candidate
        run: |
          mkdir -p dist
          npm pack --pack-destination dist

      - name: Upload combined prebuilds
        uses: actions/upload-artifact@v4
        with:
          name: release-prebuilds
          path: prebuilds/**/*.node
          if-no-files-found: error
          retention-days: 14

      - name: Upload npm package
        uses: actions/upload-artifact@v4
        with:
          name: swm-uws-release-candidate
          path: dist/*.tgz
          if-no-files-found: error
          retention-days: 14

  package-smoke:
    name: Package smoke / ${{ matrix.os }} / Node.js ${{ matrix.node }}
    needs: package
    runs-on:
      group: swm-ci
      labels: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            runner: swm-linux
            node: 22
          - os: ubuntu-24.04
            runner: swm-linux
            node: 24
          - os: windows-self-hosted
            runner: swm-win
            node: 22
          - os: windows-self-hosted
            runner: swm-win
            node: 24

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Download npm package
        uses: actions/download-artifact@v4
        with:
          name: swm-uws-release-candidate
          path: dist

      - name: Install and smoke-test packed package on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          tgz="$(find "$GITHUB_WORKSPACE/dist" -name '*.tgz' -type f -print -quit)"
          test -n "$tgz"
          mkdir consumer
          cp test/installed-smoke.js consumer/smoke.mjs
          cd consumer
          npm init -y
          npm install "$tgz" --omit=dev
          node smoke.mjs

      - name: Install and smoke-test packed package on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $tgz = Get-ChildItem "$env:GITHUB_WORKSPACE\dist" -Filter '*.tgz' -File | Select-Object -First 1
          if (-not $tgz) {
            throw 'Missing packed npm package'
          }
          New-Item -ItemType Directory consumer | Out-Null
          Copy-Item test/installed-smoke.js consumer/smoke.mjs
          Set-Location consumer
          npm.cmd init -y
          npm.cmd install $tgz.FullName --omit=dev
          node smoke.mjs

  publish:
    name: Publish npm package
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package-smoke
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          test "$tag_version" = "$package_version"

      - name: Download tested npm package
        uses: actions/download-artifact@v4
        with:
          name: swm-uws-release-candidate
          path: dist

      - name: Publish npm package
        shell: bash
        run: |
          tgz="$(find "$GITHUB_WORKSPACE/dist" -name '*.tgz' -type f -print -quit)"
          test -n "$tgz"
          npm publish "$tgz" --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
