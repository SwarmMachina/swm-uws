name: Quality

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, lint, and vendor integrity
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check shared standards
        run: npm run check

      - name: Packed consumer type resolution
        run: npm run test:types

      - name: Package metadata and contents
        run: npm run test:package

      - name: Verify vendored sources
        run: npm run deps:check:vendor

      - name: Verify generated benchmark report
        run: npm run bench:report:check

  native:
    name: Native smoke / Node.js ${{ matrix.node }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        node:
          - 22
          - 24

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build native addon
        run: npm run build:native

      - name: Run package smoke
        run: npm test

      - name: Install pinned upstream reference
        if: matrix.node == 24
        run: |
          npm install \
            --prefix "$RUNNER_TEMP/uws-reference" \
            --ignore-scripts \
            --no-save \
            "uwebsockets.js@github:uNetworking/uWebSockets.js#v20.69.0"
          echo "SWM_UWS_REFERENCE=$RUNNER_TEMP/uws-reference/node_modules/uwebsockets.js/ESM_wrapper.mjs" >> "$GITHUB_ENV"

      - name: Compare runtime surface with pinned upstream
        if: matrix.node == 24
        run: npm run test:compat:upstream

      - name: Run raw V8 HTTP smoke
        run: npm run test:v8-http

      - name: Verify snapshot V8 shapes
        run: npm run test:v8-snapshot-shapes

      - name: Run raw V8 WebSocket smoke
        run: npm run test:v8-ws
